<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H4X Lifafa - Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #ffffff; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card { background: #ffffff; border-radius: 20px; padding: 35px 25px; width: 100%; max-width: 480px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); border: 1px solid #f0f0f0; text-align: center; }
        h2 { color: #1a1a1a; font-size: 26px; margin-bottom: 20px; font-weight: 700; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 13px; color: #555; font-weight: 600; margin-bottom: 6px; }
        .input-group input { width: 100%; padding: 12px 16px; border: 2px solid #e8e8e8; border-radius: 12px; font-size: 15px; outline: none; transition: all 0.3s ease; background: #fafafa; }
        .input-group input:focus { border-color: #ff4757; background: #ffffff; box-shadow: 0 0 10px rgba(255, 71, 87, 0.1); }
        .glow-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; color: white; background: linear-gradient(135deg, #ff4757, #ff6b81); cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3); margin-top: 10px; }
        .glow-btn:hover { box-shadow: 0 0 25px rgba(255, 71, 87, 0.6); transform: translateY(-2px); }
        .switch-text { margin-top: 20px; font-size: 14px; color: #666; }
        .switch-text a { color: #ff4757; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Create Account</h2>
        
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="reg-username" placeholder="Enter username">
        </div>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="reg-email" placeholder="Enter email">
        </div>

        <div class="input-group">
            <label>Phone Number</label>
            <input type="text" id="reg-phone" placeholder="Enter phone number">
        </div>
        
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="reg-password" placeholder="••••••••">
        </div>

        <!-- Referral Code Input (Auto-filled if opened via link) -->
        <div class="input-group">
            <label>Referral Code (Optional)</label>
            <input type="text" id="reg-refcode" placeholder="Enter referral code if any">
        </div>

        <button type="button" id="register-btn" class="glow-btn">REGISTER</button>

        <div class="switch-text">
            Already have an account? <a href="index.html">Login here</a>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD2TYdbhZwLSQJEfV2tHOawK-XzKvOKlkQ",
            authDomain: "h4xlifafa.firebaseapp.com",
            databaseURL: "https://h4xlifafa-default-rtdb.firebaseio.com",
            projectId: "h4xlifafa",
            storageBucket: "h4xlifafa.firebasestorage.app",
            messagingSenderId: "51114522531",
            appId: "1:51114522531:web:face1332e055ed44690c16"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // Auto-detect referral code from URL parameters (e.g. register.html?ref=H4X12345)
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const refParam = urlParams.get('ref');
            if (refParam) {
                document.getElementById('reg-refcode').value = refParam;
                document.getElementById('reg-refcode').readOnly = true; // Lock field if code came via link
            }
        });

        // Generate a random unique referral code for the new user
        function generateReferralCode() {
            let chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = 'H4X';
            for (let i = 0; i < 6; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }

        document.getElementById('register-btn').addEventListener('click', () => {
            const username = document.getElementById('reg-username').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const password = document.getElementById('reg-password').value;
            const refCodeInput = document.getElementById('reg-refcode').value.trim();

            if (!username || !email || !phone || !password) {
                alert("Please fill in all required fields!");
                return;
            }

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const uid = userCredential.user.uid;
                    const myReferralCode = generateReferralCode();

                    let userData = {
                        username: username,
                        email: email,
                        phone: phone,
                        wallet_balance: 0,
                        referral_code: myReferralCode,
                        referred_by: refCodeInput || "None",
                        created_at: Date.now()
                    };

                    // Save user data to Firebase
                    db.ref('users/' + uid).set(userData).then(() => {
                        // If a valid referral code was provided, link this user under that referrer
                        if (refCodeInput) {
                            // Find the referrer user by matching referral_code
                            db.ref('users').orderByChild('referral_code').equalTo(refCodeInput).once('value', (snapshot) => {
                                if (snapshot.exists()) {
                                    snapshot.forEach((childSnap) => {
                                        let referrerUid = childSnap.key;
                                        // Push this new user's UID into the referrer's 'referrals' node
                                        db.ref(`users/${referrerUid}/referrals/${uid}`).set({
                                            username: username,
                                            joined_at: Date.now()
                                        });
                                    });
                                }
                            });
                        }

                        alert("Registration Successful!");
                        window.location.href = "dashboard.html";
                    });
                })
                .catch((error) => {
                    alert("Error: " + error.message);
                });
        });
    </script>
</body>
</html>
