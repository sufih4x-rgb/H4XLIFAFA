<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H4X Lifafa - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #ffffff; min-height: 100vh; padding: 0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        /* Global Announcement Notice Bar */
        .admin-notice-bar { width: 100%; max-width: 480px; background: linear-gradient(135deg, #ff4757, #ff6b81); color: white; padding: 8px 12px; font-size: 13px; font-weight: 700; display: none; overflow: hidden; }
        /* Top Header */
        .top-header { width: 100%; max-width: 480px; display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #ffffff; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; z-index: 100; }
        .menu-btn { font-size: 24px; cursor: pointer; color: #1a1a1a; background: none; border: none; padding: 5px; }
        .logo-text { font-size: 20px; font-weight: 800; color: #ff4757; }
        .container { width: 100%; max-width: 480px; text-align: center; padding: 15px; display: flex; flex-direction: column; }
        
        /* Fixed Aspect-Ratio Slider Container */
        .slider-wrapper { width: 100%; overflow: hidden; border-radius: 16px; margin-bottom: 20px; aspect-ratio: 16 / 9; background: #f0f0f0; position: relative; }
        .slides { display: flex; height: 100%; transition: transform 0.5s ease-in-out; width: 100%; }
        .slide { height: 100%; object-fit: cover; flex-shrink: 0; cursor: pointer; }
        
        /* User Info Section */
        .user-panel { background: #ffffff; border: 1px solid #f0f0f0; border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: left; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .username-display { font-size: 24px; font-weight: 700; color: #1a1a1a; margin-bottom: 15px; }
        .balance-box { background: #fafafa; border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px dashed #e0e0e0; display: flex; justify-content: space-between; align-items: center; }
        .balance-amount { font-size: 22px; font-weight: 700; color: #2ed573; }
        .action-row { display: flex; gap: 12px; margin-bottom: 20px; }
        .glow-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; color: white; cursor: pointer; text-align: center; transition: transform 0.2s; }
        .glow-btn:active { transform: scale(0.98); }
        .btn-add { background: linear-gradient(135deg, #2ed573, #7bed9f); }
        .btn-withdraw { background: linear-gradient(135deg, #ff4757, #ff6b81); }
        
        /* Dynamic Grid Layout on Dashboard Main Page */
        .features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        
        /* 🎨 DYNAMIC GLOWING NEON CLASSES */
        .dynamic-feature-btn { background: #ffffff; border: 2px solid #e8e8e8; padding: 16px; border-radius: 14px; font-weight: 700; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; min-height: 80px; color: #333; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .glow-red { border-color: #ff4757; color: #ff4757; box-shadow: 0 0 10px rgba(255, 71, 87, 0.2); }
        .glow-red:hover { background: #ff4757; color: white; box-shadow: 0 0 20px rgba(255, 71, 87, 0.6); }
        .glow-green { border-color: #2ed573; color: #2ed573; box-shadow: 0 0 10px rgba(46, 213, 115, 0.2); }
        .glow-green:hover { background: #2ed573; color: white; box-shadow: 0 0 20px rgba(46, 213, 115, 0.6); }
        .glow-blue { border-color: #1e90ff; color: #1e90ff; box-shadow: 0 0 10px rgba(30, 144, 255, 0.2); }
        .glow-blue:hover { background: #1e90ff; color: white; box-shadow: 0 0 20px rgba(30, 144, 255, 0.6); }
        .glow-purple { border-color: #9b59b6; color: #9b59b6; box-shadow: 0 0 10px rgba(155, 89, 182, 0.2); }
        .glow-purple:hover { background: #9b59b6; color: white; box-shadow: 0 0 20px rgba(155, 89, 182, 0.6); }
        .glow-yellow { border-color: #ffa500; color: #ffa500; box-shadow: 0 0 10px rgba(255, 165, 0, 0.2); }
        .glow-yellow:hover { background: #ffa500; color: white; box-shadow: 0 0 20px rgba(255, 165, 0, 0.6); }
        
        /* Sidebar Overlay Drawers */
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1500; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #ffffff; z-index: 1600; box-shadow: 5px 0 25px rgba(0,0,0,0.15); transition: left 0.3s ease-in-out; display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; background: #fafafa; }
        .sidebar-title { font-weight: 700; color: #1a1a1a; font-size: 18px; }
        .close-sidebar { font-size: 22px; cursor: pointer; color: #888; background: none; border: none; }
        .sidebar-menu { flex: 1; overflow-y: auto; padding: 15px 10px; display: flex; flex-direction: column; gap: 8px; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 10px; color: #444; text-decoration: none; font-weight: 600; font-size: 15px; background: transparent; border: none; text-align: left; cursor: pointer; width: 100%; }
        .menu-item:hover { background: #fff5f6; color: #ff4757; }
        .menu-item.active { background: linear-gradient(135deg, #ff4757, #ff6b81); color: white; }
        .menu-divider { height: 1px; background: #f0f0f0; margin: 10px 5px; }
    </style>
</head>
<body>
    <!-- Dynamic Admin Announcement Banner Alert Area -->
    <div class="admin-notice-bar" id="global-notice-zone">
        <marquee scrollamount="5" id="notice-marquee-text" direction="left">Loading updates...</marquee>
    </div>

    <!-- Sticky Native-look Nav Header -->
    <div class="top-header">
        <button class="menu-btn" id="open-sidebar-btn">☰</button>
        <div class="logo-text">H4X LIFAFA</div>
        <div style="width: 34px;"></div>
    </div>

    <!-- Sidebar Drawer System Elements -->
    <div class="sidebar-overlay" id="sidebar-backdrop"></div>
    <div class="sidebar" id="app-sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">Menu Panel</div>
            <button class="close-sidebar" id="close-sidebar-btn">✕</button>
        </div>
        <div class="sidebar-menu">
            <button class="menu-item active" onclick="window.location.href='dashboard.html'">🏠 Dashboard Home</button>
            <button class="menu-item" onclick="window.location.href='profile.html'">⚙️ Profile Settings</button>
            <button class="menu-item" onclick="window.location.href='refer.html'">👥 Refer & Earn</button>
            <div class="menu-divider"></div>
            
            <!-- Target Node for Admin Custom Sidebar Links Injection -->
            <div id="admin-sidebar-target" style="display:flex; flex-direction:column; gap:8px;"></div>
            
            <div class="menu-divider"></div>
            <button class="menu-item" id="sidebar-logout-btn" style="color: #ff4757;">🚪 Secure Logout</button>
        </div>
    </div>

    <!-- Main Dynamic Content Wrapper -->
    <div class="container" id="dashboard-main-content">
        <!-- Secure Dynamic Multi-image Horizontal Carousel -->
        <div class="slider-wrapper">
            <div class="slides" id="slides-container"></div>
        </div>

        <!-- Dynamic Data Identity Component -->
        <div class="user-panel">
            <span style="color:#888; font-size:14px;">Welcome Back,</span>
            <div class="username-display" id="dash-username">Loading...</div>
            <div class="balance-box">
                <span style="color:#666; font-weight:600;">WALLET BALANCE</span>
                <span class="balance-amount" id="dash-balance">₹0.00</span>
            </div>
            <div class="action-row">
                <button class="glow-btn btn-add" onclick="window.location.href='deposit.html'">ADD MONEY</button>
                <button class="glow-btn btn-withdraw" onclick="window.location.href='withdraw.html'">WITHDRAW</button>
            </div>
        </div>

        <!-- Target Grid for Injecting Admin Controlled Main Page Layout Buttons -->
        <div class="features-grid" id="main-page-grid-target"></div>
    </div>

    <!-- Component Logic Engine CDN Core Script Imports -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD2TYdbhZwLSQJEfV2tHOawK-XzKvOKlkQ",
            authDomain: "h4xlifafa.firebaseapp.com",
            databaseURL: "https://h4xlifafa-default-rtdb.firebaseio.com",
            projectId: "h4xlifafa",
            storageBucket: "h4xlifafa.firebasestorage.app",
            messagingSenderId: "51114522531",
            appId: "1:51114522531:web:face1332e055ed44690c16"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUid = null;
        let slideIndex = 0, sliderInterval = null;

        const sidebar = document.getElementById('app-sidebar');
        const backdrop = document.getElementById('sidebar-backdrop');

        function openSidebar() { sidebar.classList.add('active'); backdrop.style.display = 'block'; }
        function closeSidebar() { sidebar.classList.remove('active'); backdrop.style.display = 'none'; }
        
        document.getElementById('open-sidebar-btn').addEventListener('click', openSidebar);
        document.getElementById('close-sidebar-btn').addEventListener('click', closeSidebar);
        backdrop.addEventListener('click', closeSidebar);

        auth.onAuthStateChanged((user) => {
            if (user) { 
                currentUid = user.uid; 
                loadDashboardData();
            } else { 
                window.location.href = "index.html"; 
            }
        });

        function loadDashboardData() {
            db.ref('users/' + currentUid).on('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('dash-username').innerText = "@" + (data.username || "User");
                    document.getElementById('dash-balance').innerText = "₹" + (data.wallet_balance || 0).toFixed(2);
                }
            });
            loadGlobalAdminEngines(); 
        }

        function loadGlobalAdminEngines() {
            db.ref('app_notice').on('value', (snapshot) => {
                const notice = snapshot.val();
                const zone = document.getElementById('global-notice-zone');
                if (notice && notice.status === "active" && notice.text.trim() !== "") {
                    zone.style.display = "block";
                    document.getElementById('notice-marquee-text').innerText = notice.text;
                } else { 
                    zone.style.display = "none"; 
                }
            });

            db.ref('app_buttons').on('value', (snapshot) => {
                document.getElementById('admin-sidebar-target').innerHTML = "";
                document.getElementById('main-page-grid-target').innerHTML = "";
                const buttons = snapshot.val();
                if(buttons) {
                    Object.keys(buttons).forEach(key => {
                        const btn = buttons[key];
                        if(btn.status === "active") {
                            const action = btn.link.startsWith('http') ? `window.open('${btn.link}', '_blank')` : `window.location.href='${btn.link}'`;
                            
                            if(btn.placement === "sidebar") {
                                const el = document.createElement('button'); el.className = "menu-item";
                                el.setAttribute('onclick', action); el.innerText = btn.title;
                                document.getElementById('admin-sidebar-target').appendChild(el);
                            } else {
                                const el = document.createElement('div'); 
                                const glowingColorClass = btn.color ? `glow-${btn.color}` : 'glow-red';
                                el.className = `dynamic-feature-btn ${glowingColorClass}`;
                                el.setAttribute('onclick', action); 
                                el.innerHTML = `<span>${btn.title}</span>`;
                                document.getElementById('main-page-grid-target').appendChild(el);
                            }
                        }
                    });
                }
            });

            db.ref('app_banners').on('value', (snapshot) => {
                const sliderBox = document.getElementById('slides-container');
                sliderBox.innerHTML = "";
                const banners = snapshot.val();
                if(banners) {
                    const keys = Object.keys(banners);
                    const totalSlides = keys.length;
                    sliderBox.style.width = `${totalSlides * 100}%`;
                    
                    keys.forEach(key => {
                        const bnr = banners[key];
                        const img = document.createElement('img');
                        img.src = bnr.image;
                        img.className = "slide";
                        img.style.width = `${100 / totalSlides}%`;
                        img.onclick = () => { if(bnr.target) window.open(bnr.target, '_blank'); };
                        sliderBox.appendChild(img);
                    });
                    startAutomaticSliderTransitions(totalSlides);
                }
            });
        }

        function startAutomaticSliderTransitions(totalSlides) {
            if(totalSlides <= 1) return;
            if(sliderInterval) clearInterval(sliderInterval);
            sliderInterval = setInterval(() => {
                slideIndex = (slideIndex + 1) % totalSlides;
                const movePercentage = slideIndex * (100 / totalSlides);
                document.getElementById('slides-container').style.transform = `translateX(-${movePercentage}%)`;
            }, 4000);
        }

        document.getElementById('sidebar-logout-btn').addEventListener('click', () => { auth.signOut(); localStorage.clear(); window.location.href = "index.html"; });
    </script>
</body>
</html>
